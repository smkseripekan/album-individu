<!DOCTYPE html>
<html>
<head>
  <title>e-SMKSP</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 0; }
    header { display: flex; align-items: center; padding: 10px 20px; background-color: #f5f5f5; }
    header img { height: 40px; width: auto; margin-right: 10px; }
    main { text-align: center; margin-top: 50px; }
    img#image { max-width: 90%; margin-top: 20px; }
    .hidden { display: none; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    input { padding: 10px; font-size: 16px; width: 200px; }
  </style>
</head>
<body>

  <!-- Header with logo -->
  <header>
    <img src="SMKSP.png" alt="Logo">
    <h2>Gambar Passport Warga SMKSP</h2>
  </header>

  <main>
    <input type="password" id="code" placeholder="Masukkan nombor kad pengenalan">
    <br><br>
    <button onclick="checkCode()">Sahkan</button>

    <div id="result" class="hidden">
      <h3>Nombor kad pengenalan diterima</h3>
      <img id="image" src="">
      <br><br>
      <a id="download" download>Muat turun gambar</a>
    </div>
  </main>

  <script>
    const codes = {
      "080210060195": "AIMI NABILAH BINTI ISMAIL.png",
      "IMG002": "img002.jpg",
      "IMG003": "img003.jpg"
    };

    function checkCode() {
      const input = document.getElementById("code").value.trim();
      if (codes[input]) {
        document.getElementById("image").src = codes[input];
        document.getElementById("download").href = codes[input];
        document.getElementById("result").classList.remove("hidden");
      } else {
        alert("Invalid code");
      }
    }
  </script>

</body>
</html>
