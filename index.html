<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>e-SMKSP</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
    }

    header {
      display: flex;
      align-items: center;
      padding: 15px 30px;
      background: #1e3a8a;
      color: white;
    }

    header img {
      height: 45px;
      margin-right: 15px;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 60px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      text-align: center;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }

    #result {
      margin-top: 25px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    a.download-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #16a34a;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    a.download-btn:hover {
      background: #15803d;
    }

    .credit {
  margin-top: 20px;
  font-size: 12px;
  color: #999;
  letter-spacing: 2px;
  opacity: 0.7;
  font-weight: 500;

      #studentName {
  margin: 8px 0 15px;
  font-weight: 600;
  font-size: 15px;
  color: #1e3a8a;
  letter-spacing: 0.5px;
}

      .extra-preview {
  width: 100%;
  height: 250px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

      #image {
  width: 100%;
  max-width: 413px;
  height: 590px;
  border: none;
  border-radius: 10px;
}
}
  </style>
</head>

<body>

<header>
  <img src="SMKSP.png">
  <h2>e-SMKSP | <span id="datetime"></span></h2>
</header>

<main>
  <div class="card">
    <h2>Semakan Gambar Individu15</h2>

    <input type="password" id="code" placeholder="Masukkan No. IC tanpa -" onkeypress="handleKey(event)">
    
    <button onclick="checkCode()">Sahkan</button>

    <div id="error"></div>

    <div id="result" class="hidden">

<p id="studentName"></p>

<iframe id="image"></iframe>

<a id="download" class="download-btn" download>Muat Turun</a>
      <iframe id="image2" class="extra-preview"></iframe>
      <p class="credit">© fahimirf 2026</p>
    </div>
  </div>
</main>

<script>
  const BASE_URL = "https://raw.githubusercontent.com/smkseripekan/album-individu/main/images/";
  const codes = {
  "080210060195": {
    name: "epat",
    file: "ADLI FAHMI BIN KHARULANUAR.png",
    drive: "https://drive.google.com/file/d/1Yp9rQnRFlOGu_AKqtuqLMewi1Rshd-S2/preview"
  }
};
  function handleKey(e) {
    if (e.key === "Enter") {
      checkCode();
    }
  }

  function checkCode() {
  const input = document.getElementById("code").value.trim();
  const error = document.getElementById("error");
  const result = document.getElementById("result");

  result.classList.add("hidden");
  error.textContent = "";

  if (codes[input]) {
    const data = codes[input];

    const imageURL = BASE_URL + encodeURIComponent(data.file);

    document.getElementById("studentName").textContent = data.name;
    document.getElementById("image").src = imageURL;
    document.getElementById("image2").src = data.drive;
    document.getElementById("download").href = imageURL;

    result.classList.remove("hidden");
  } else {
    error.textContent = "Nombor kad pengenalan tidak sah";
  }
}
function updateDateTime() {
  const now = new Date();

  const day = now.getDate();
  const month = now.getMonth() + 1;
  const year = now.getFullYear();

  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2, '0');

  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12; // kalau 0 jadi 12

  const timeString = `${day}/${month}/${year} | ${hours}:${minutes} ${ampm}`;

  document.getElementById("datetime").textContent = timeString;
}

// update setiap saat
setInterval(updateDateTime, 1000);

// run sekali masa load
updateDateTime();

</script>

</body>
</html>
