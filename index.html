  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
    }

    header {
      display: flex;
      align-items: center;
      padding: 15px 30px;
      background: #1e3a8a;
      color: white;
    }

    header img {
      height: 45px;
      margin-right: 15px;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 60px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      text-align: center;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }

    #result {
      margin-top: 25px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    a.download-btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 22px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;

  /* 🔥 shadow */
  box-shadow: 0 6px 15px rgba(34, 197, 94, 0.4);

  transition: all 0.2s ease;
}

    a.download-btn:hover {
  background: linear-gradient(135deg, #16a34a, #15803d);

  /* 🔥 naik sikit */
  transform: translateY(-2px);

  /* shadow lebih kuat */
  box-shadow: 0 10px 20px rgba(34, 197, 94, 0.5);
}

    a.download-btn:active {
  transform: translateY(0);
  box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
}
    
    .credit {
  margin-top: 20px;
  font-size: 14px;
  color: #4F4F4F;
  letter-spacing: 2px;
  opacity: 0.9;
  font-weight: 500;
}

#studentName {
  margin: 8px 0 15px;
  font-weight: 600;
  font-size: 15px;
  color: #1e3a8a;
  letter-spacing: 0.5px;
}

.extra-preview {
  width: 100%;
  height: 250px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

#image {
  width: 100%;
  max-width: 413px;
  height: 590px;
  border-radius: 10px;
  object-fit: cover;
}
  </style>
</head>

</main>

  function checkCode() {
  const input = document.getElementById("code").value.trim();
  const error = document.getElementById("error");
  const result = document.getElementById("result");

  result.classList.add("hidden");
  error.textContent = "";

  if (codes[input]) {
    const data = codes[input];
    document.getElementById("studentName").textContent = data.name;
    document.getElementById("image").src = data.file;
    document.getElementById("download").href = data.file;
    document.getElementById("image2").src = data.drive;

    result.classList.remove("hidden");
  } else {
    error.textContent = "Nombor kad pengenalan tidak sah";
  }
}
function updateDateTime() {
  const now = new Date();

  const days = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];
  const dayName = days[now.getDay()]; // 🔥 nama hari

  const day = now.getDate().toString().padStart(2, '0');
  const month = (now.getMonth() + 1).toString().padStart(2, '0');
  const year = now.getFullYear();

  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const seconds = now.getSeconds().toString().padStart(2, '0');

  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12;

  const timeString = `${dayName} | ${day}/${month}/${year} | ${hours}:${minutes}:${seconds} ${ampm}`;
  
  document.getElementById("datetime").textContent = timeString;
}

// update setiap saat
setInterval(updateDateTime, 1000);

// run sekali masa load
updateDateTime();
